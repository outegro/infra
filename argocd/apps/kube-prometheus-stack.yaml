apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: outegro
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 85.3.0
    helm:
      releaseName: monitoring
      valuesObject:
        fullnameOverride: monitoring
        grafana:
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-cloudflare
              traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
            hosts:
              - grafana.outegro.dev
            tls:
              - secretName: grafana-outegro-dev-tls
                hosts:
                  - grafana.outegro.dev
          persistence:
            enabled: true
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki-gateway.monitoring.svc.cluster.local
              isDefault: false
        alertmanager:
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by:
                - namespace
                - alertname
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: telegram
              routes:
                - receiver: "null"
                  matchers:
                    - alertname = Watchdog
            receivers:
              - name: "null"
              - name: telegram
                telegram_configs:
                  - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram-bot/bot-token
                    chat_id: -5163303784
                    parse_mode: HTML
                    send_resolved: true
          alertmanagerSpec:
            secrets:
              - alertmanager-telegram-bot
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
        prometheus:
          prometheusSpec:
            retention: 7d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 10Gi
            resources:
              requests:
                cpu: 200m
                memory: 768Mi
              limits:
                memory: 1536Mi
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
