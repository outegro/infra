apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: outegro
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 25.5.3
    helm:
      releaseName: redis
      valuesObject:
        architecture: standalone
        auth:
          enabled: true
          existingSecret: redis-auth
          existingSecretPasswordKey: redis-password
        networkPolicy:
          enabled: false
        master:
          persistence:
            enabled: true
            size: 5Gi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: databases
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
