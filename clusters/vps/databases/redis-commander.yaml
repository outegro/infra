apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-commander
  namespace: databases
  labels:
    app.kubernetes.io/name: redis-commander
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-commander
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-commander
    spec:
      containers:
        - name: redis-commander
          image: rediscommander/redis-commander:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
            - name: REDIS_HOSTS
              value: "vps-redis:redis-master.databases.svc.cluster.local:6379:0:$(REDIS_PASSWORD)"
            - name: HTTP_USER
              value: admin
            - name: HTTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-commander
  namespace: databases
  labels:
    app.kubernetes.io/name: redis-commander
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis-commander
  ports:
    - name: http
      port: 8081
      targetPort: http
